<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #020617, #111827); color: #f8fafc; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; box-sizing: border-box; }
    .card { background: rgba(17, 24, 39, 0.95); padding: 32px; border-radius: 24px; width: min(92vw, 900px); box-shadow: 0 20px 50px rgba(0,0,0,0.35); border: 1px solid rgba(148, 163, 184, 0.15); }
    h1, h2 { margin-top: 0; font-size: 24px; }
    input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(90deg, #2563eb, #38bdf8); color: white; font-size: 15px; font-weight: 600; }
    .secondary { background: linear-gradient(90deg, #64748b, #475569); }
    .message { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(148, 163, 184, 0.2); }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card-item { background: rgba(15, 23, 42, 0.9); border-radius: 16px; padding: 16px; border: 1px solid rgba(148, 163, 184, 0.15); }
    .chart-card { margin-top: 16px; padding: 14px; border-radius: 14px; background: rgba(2, 6, 23, 0.9); border: 1px solid rgba(148, 163, 184, 0.15); }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 13px; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    a { color: #93c5fd; text-decoration: none; }
    .menu { display: grid; gap: 10px; }
    ul { padding-left: 18px; }
    .muted { color: #94a3b8; }
    .roulette-shell { display: flex; flex-direction: column; gap: 18px; }
    .roulette-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .back-link { color: #38bdf8; font-weight: 600; }
    .roulette-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 18px; }
    .panel { background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(148, 163, 184, 0.16); border-radius: 20px; padding: 18px; box-shadow: 0 14px 35px rgba(0,0,0,0.24); }
    .panel h3 { margin-top: 0; margin-bottom: 14px; }
    .wheel-stage { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .wheel-card { width: 100%; background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.95)); border-radius: 24px; display: flex; justify-content: center; align-items: center; padding: 20px; min-height: 340px; }
    .wheel-outer { position: relative; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle at center, #1e293b, #020617); box-shadow: inset 0 0 0 12px rgba(251,191,36,0.25), 0 20px 45px rgba(0,0,0,0.35); animation: float 4s ease-in-out infinite; }
    .wheel-center { position: absolute; inset: 28px; border-radius: 50%; background: radial-gradient(circle at center, #0f172a, #020617); border: 3px solid #fbbf24; }
    .wheel-ball { position: absolute; top: 18px; left: 50%; width: 16px; height: 16px; border-radius: 50%; background: #f8fafc; transform: translateX(-50%); box-shadow: 0 0 12px rgba(248,250,252,0.5); }
    .wheel-pointer { position: absolute; top: -8px; left: 50%; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid #ef4444; transform: translateX(-50%); }
    .result-pill { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 999px; background: rgba(15, 23, 42, 0.95); color: #f8fafc; border: 1px solid rgba(56,189,248,0.3); }
    .result-pill .label { color: #94a3b8; font-size: 13px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .stat-card { background: rgba(15, 23, 42, 0.94); border: 1px solid rgba(148, 163, 184, 0.16); padding: 14px 16px; border-radius: 16px; box-shadow: 0 10px 24px rgba(0,0,0,0.2); }
    .stat-card span { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 4px; }
    .stat-card strong { font-size: 18px; }
    .metrics-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 16px; margin-top: 4px; }
    .metric-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; color: #e2e8f0; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid rgba(148, 163, 184, 0.14); }
    th { color: #38bdf8; }
    .statistical-shell { display: flex; flex-direction: column; gap: 16px; }
    .statistical-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 16px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .pill { display: inline-flex; align-items: center; padding: 8px 10px; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.2); font-size: 13px; }
    .pill.pass { background: rgba(16, 185, 129, 0.18); color: #a7f3d0; }
    .pill.fail { background: rgba(239, 68, 68, 0.16); color: #fecaca; }
    .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 10px; }
    .details-grid pre { white-space: pre-wrap; word-break: break-word; background: rgba(2, 6, 23, 0.75); padding: 10px; border-radius: 12px; color: #e0f2fe; }
    .interpretation { margin-top: 10px; padding: 10px 12px; border-radius: 12px; background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(56, 189, 248, 0.2); }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: grid; grid-template-columns: 110px 1fr 36px; align-items: center; gap: 8px; }
    .bar-track { height: 10px; border-radius: 999px; background: rgba(148, 163, 184, 0.2); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #38bdf8, #2563eb); }
    .test-card { display: flex; flex-direction: column; gap: 4px; }
    .test-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status { padding: 7px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .status.pass { background: rgba(16, 185, 129, 0.18); color: #a7f3d0; }
    .status.fail { background: rgba(248, 113, 113, 0.18); color: #fecaca; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @media (max-width: 900px) { .roulette-grid, .metrics-grid, .summary-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ title }}</h1>
    {% if message %}<div class="message">{{ message }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
