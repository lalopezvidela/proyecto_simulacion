{% extends "base.html" %}
{% block content %}
<div style="text-align:center; margin-bottom:16px;">
  <img src="{{ url_for('static', filename='images/images.png') }}" alt="Logo" style="width:110px; height:110px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.25);">
</div>
<h2 style="margin-top:0; text-align:center;">Iniciar sesión</h2>
<p class="muted" style="text-align:center;">Accede al sistema de simulación</p>
<form method="post" action="{{ url_for('login') }}">
  <input type="text" name="username" placeholder="Usuario" required>
  <input type="password" name="password" placeholder="Contraseña" required>
  <button type="submit">Iniciar sesión</button>
</form>
<p style="text-align:center; margin-top:12px;">¿No tienes cuenta? <a href="{{ url_for('register_page') }}">Regístrate</a></p>
{% endblock %}
